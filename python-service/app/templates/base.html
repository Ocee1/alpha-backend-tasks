<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{{ title }}</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        margin: 0;
        padding: 2rem;
        color: #1f2937;
        display: flex;
        flex-direction: column;
        align-items: center; /* center the container horizontally */
      }

      main {
        max-width: 800px;
        width: 100%;
      }

      h1 {
        text-align: center; /* only the main title centered */
      }

      h2, h3, section, ul {
        text-align: left; /* headings, sections, and lists left-aligned */
      }

      section {
        margin: 1.5rem 0;
      }

      ul {
        list-style-type: disc;
        padding-left: 1.5rem; /* keep bullets aligned */
      }

      footer {
        margin-top: 2rem;
        font-size: 0.875rem;
        color: #6b7280;
        text-align: center; /* footer centered */
      }

      .divider {
        border: none;          /* remove default border */
        height: 3px;           /* thickness */
        background-color: #1f2937;  /* dark color matching text */
        margin: 1rem 0;        /* spacing above and below */
      }
    </style>
  </head>
  <body>
    <main>
      <h1>{{ title }}</h1>
      <div>{{ body | safe }}</div>
    </main>
    <footer>Generated at: {{ generated_at }}</footer>
  </body>
</html>
